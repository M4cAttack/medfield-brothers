<style>
  :root{
    --ink:#0A1830;
    --ink-2:#132A4D;
    --olive:#4D5525;
    --gold:#C9A86B;
    --gold-deep:#B08F50;
    --cream:#F2EFE9;
    --paper:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Lora', Georgia, serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }
  .card{
    text-align:center;
    max-width:520px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    text-transform:uppercase;
    letter-spacing:0.16em;
    font-size:0.72rem;
    font-weight:600;
    color:var(--olive);
    display:block;
    margin-bottom:22px;
  }
  .crest-wrap{position:relative;display:flex;justify-content:center;margin-bottom:32px;}
  .crest-glow{
    position:absolute;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle, rgba(201,168,107,0.4), transparent 70%);
    filter:blur(6px);
    animation:pulse 3.2s ease-in-out infinite;
  }
  .crest-wrap img{
    width:200px;height:200px;border-radius:50%;object-fit:cover;
    border:6px solid var(--paper);
    box-shadow:0 18px 40px -16px rgba(10,24,48,0.3);
    position:relative;z-index:1;
  }
  h1{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.02em;
    font-size:clamp(2rem, 6vw, 2.8rem);
    margin:0 0 14px;
    color:var(--ink);
  }
  .sub{
    font-family:'Lora', serif;
    font-style:italic;
    font-weight:500;
    font-size:1.05rem;
    color:var(--ink-2);
    margin:0 0 28px;
  }
  .tagline{
    font-family:'JetBrains Mono', monospace;
    text-transform:uppercase;
    letter-spacing:0.18em;
    font-size:0.78rem;
    color:var(--gold-deep);
    margin-bottom:30px;
  }
  .divider{
    width:48px;height:2px;background:var(--olive);
    margin:0 auto 30px;border:none;
  }
  .note{
    font-size:0.95rem;
    color:var(--ink-2);
    margin:0 0 6px;
  }
  .loc{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-2);
    opacity:0.7;
    margin-top:24px;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);opacity:0.9;}
    50%{transform:scale(1.08);opacity:1;}
  }
  @media (prefers-reduced-motion: reduce){
    .crest-glow{animation:none;}
  }
</style>
